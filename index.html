<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHSAS Union Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-md p-8 rounded-2xl shadow-2xl border border-slate-800 relative overflow-hidden">
        
        <div class="absolute top-0 right-0 bg-gradient-to-l from-teal-500 to-emerald-600 text-slate-950 text-[10px] font-black px-4 py-1 rounded-bl-xl tracking-widest shadow">
            IHSAS UNION
        </div>

        <div class="text-center mb-8 mt-2">
            <div class="text-5xl mb-3 animate-pulse">👑</div>
            <h2 class="text-3xl font-extrabold text-teal-400 tracking-wide uppercase">IHSAS <span class="text-slate-100 font-medium text-2xl block text-sm tracking-normal normal-case mt-1 text-slate-400">Union Portal</span></h2>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Select Account / Class</label>
                <select id="username" required 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 focus:ring-2 focus:ring-teal-500 focus:outline-none cursor-pointer">
                    <option value="" disabled selected>-- Choose your class --</option>
                    <option value="Admin">Union Admin 👑</option>
                    <option value="Marjan">Marjan</option>
                    <option value="Wahda">Wahda</option>
                    <option value="Suhba">Suhba</option>
                    <option value="Hira">Hira</option>
                    <option value="Safe">Safe</option>
                    <option value="Isra">Isra</option>
                    <option value="Chirag">Chirag</option>
                    <option value="Swafwa">Swafwa</option>
                    <option value="Alif">Alif</option>
                    <option value="Parwaz">Parwaz</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <input type="password" id="password" required placeholder="Enter Union Name as Password"
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 placeholder-slate-700 focus:ring-2 focus:ring-teal-500 focus:outline-none">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-teal-500/10 transform hover:-translate-y-0.5">
                Login Securely ⚡
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value.trim();

            // പാസ്‌വേഡ് ചെക്കിങ് സിസ്റ്റം - അഡ്മിന് Admin, മറ്റുള്ളവർക്ക് IHSAS
            if (user === 'Admin' && pass.toLowerCase() === 'admin') {
                localStorage.setItem('loggedInUser', user);
                window.location.href = 'admin.html';
            } else if (user !== 'Admin' && pass.toUpperCase() === 'IHSAS') {
                localStorage.setItem('loggedInUser', user);
                window.location.href = 'dashboard.html';
            } else {
                alert(user === 'Admin' ? 'Wrong Admin Password!' : 'Wrong Password! Use your Union Name "IHSAS" as password.');
            }
        });
    </script>
</body>
</html>
