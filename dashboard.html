<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHSAS - Class Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen font-sans text-slate-100 relative">

    <div id="successModal" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border border-teal-500/30">
            <div class="text-6xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-teal-400 mb-2">Success!</h3>
            <p class="text-slate-300 mb-6">Your report has been submitted successfully.</p>
            <button onclick="closeModal()" class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Awesome
            </button>
        </div>
    </div>

    <nav class="bg-slate-950/60 backdrop-blur-md text-white p-4 shadow-lg flex justify-between items-center px-6 md:px-12 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <span class="bg-gradient-to-r from-teal-500 to-emerald-600 text-slate-950 font-black text-xs px-2.5 py-1 rounded-md tracking-wider">IHSAS</span>
            <h1 class="text-lg font-bold tracking-wide">Portal: <span class="text-teal-400" id="classNavName">Loading...</span></h1>
        </div>
        <button onclick="logout()" class="bg-rose-600/80 hover:bg-rose-600 px-4 py-2 rounded-lg font-semibold text-sm transition">Logout</button>
    </nav>

    <div class="max-w-3xl mx-auto mt-10 p-4 space-y-8">
        
        <main class="p-8 bg-slate-900/80 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-800">
            <h2 class="text-2xl font-bold text-teal-400 mb-6 border-b border-slate-800 pb-3 flex items-center gap-2">
                📝 Submit Class Report
            </h2>

            <form id="reportForm" class="space-y-6">
                
                <!-- Section 1: Union's Report -->
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Type Your Union's Report</label>
                    <textarea id="unionReportText" rows="4" required placeholder="Enter main union report details..."
                        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-600 focus:ring-2 focus:ring-teal-500 focus:outline-none transition"></textarea>
                </div>

                <!-- Section 2: Outreach Programmes -->
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Type Your Outreach Programmes</label>
                    <textarea id="outreachText" rows="4" required placeholder="Enter outreach details..."
                        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-600 focus:ring-2 focus:ring-teal-500 focus:outline-none transition"></textarea>
                </div>

                <!-- Section 3: Achievements -->
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Type Your Achievements Of Union</label>
                    <textarea id="achievementsText" rows="4" required placeholder="Enter achievements details..."
                        class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl text-slate-100 placeholder-slate-600 focus:ring-2 focus:ring-teal-500 focus:outline-none transition"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-950/50 p-4 rounded-xl border border-dashed border-slate-800">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">📸 Upload Image</label>
                        <input type="file" id="reportImages" accept="image/*" 
                            class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-teal-950 file:text-teal-400 hover:file:bg-teal-900 cursor-pointer">
                    </div>
                    <div class="bg-slate-950/50 p-4 rounded-xl border border-dashed border-slate-800">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">📄 Upload Document / PDF</label>
                        <input type="file" id="reportDocs" accept=".pdf" 
                            class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-teal-950 file:text-teal-400 hover:file:bg-teal-900 cursor-pointer">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg transform hover:-translate-y-0.5 text-center">
                        Submit Report 🚀
                    </button>
                </div>
            </form>
        </main>

        <section class="p-8 bg-slate-900/80 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-800">
            <h2 class="text-xl font-bold text-slate-200 mb-4 flex items-center gap-2">
                📊 Our Submitted Reports Status
            </h2>
            <div id="myReportsContainer" class="space-y-3"></div>
        </section>
    </div>

    <script>
        const currentClass = localStorage.getItem('loggedInUser');
        if (!currentClass || currentClass === 'Admin') {
            window.location.href = 'index.html';
        } else {
            document.getElementById('classNavName').innerText = currentClass;
        }

        function loadMyReportsStatus() {
            const container = document.getElementById('myReportsContainer');
            container.innerHTML = '';
            const reports = JSON.parse(localStorage.getItem('allReports')) || [];
            const myFiltered = reports.filter(r => r.className === currentClass);

            if (myFiltered.length === 0) {
                container.innerHTML = `<p class="text-sm text-slate-500 italic">No reports submitted yet.</p>`;
                return;
            }

            myFiltered.forEach(report => {
                let statusBadge = report.status === 'Approved' ? 
                    `<span class="bg-emerald-950 text-emerald-400 text-xs font-bold px-3 py-1 rounded-full border border-emerald-500/30">✅ Approved</span>` :
                    (report.status === 'Rejected' ? 
                    `<span class="bg-rose-950 text-rose-400 text-xs font-bold px-3 py-1 rounded-full border border-rose-500/30">❌ Rejected</span>` :
                    `<span class="bg-amber-950 text-amber-400 text-xs font-bold px-3 py-1 rounded-full border border-amber-500/30">⏳ Pending</span>`);

                const row = document.createElement('div');
                row.className = "flex justify-between items-center bg-slate-950/50 p-4 rounded-xl border border-slate-800";
                row.innerHTML = `
                    <div class="max-w-[70%]">
                        <p class="text-slate-300 text-sm font-medium truncate">📄 Report (${report.time})</p>
                    </div>
                    <div>${statusBadge}</div>
                `;
                container.appendChild(row);
            });
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            // മൂന്ന് ടെക്സ്റ്റുകളും ഒരൊറ്റ വേരിയബിളിലേക്ക് മാറ്റുന്നു
            const unionReport = document.getElementById('unionReportText').value;
            const outreach = document.getElementById('outreachText').value;
            const achievements = document.getElementById('achievementsText').value;

            const imgFile = document.getElementById('reportImages').files[0];
            const docFile = document.getElementById('reportDocs').files[0];

            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                let imgData = null;
                let docData = null;
                let docName = 'No PDF Uploaded';

                if (imgFile) imgData = await toBase64(imgFile);
                if (docFile) {
                    docData = await toBase64(docFile);
                    docName = docFile.name;
                }

                const newReport = {
                    id: String(Date.now()),
                    className: currentClass,
                    unionReport: unionReport,
                    outreach: outreach,
                    achievements: achievements,
                    time: new Date().toLocaleString(),
                    status: 'Pending',
                    imageData: imgData,
                    docData: docData,
                    docName: docName
                };

                let reports = JSON.parse(localStorage.getItem('allReports')) || [];
                reports.push(newReport);
                localStorage.setItem('allReports', JSON.stringify(reports));

                document.getElementById('successModal').classList.remove('hidden');
                document.getElementById('reportForm').reset();
                loadMyReportsStatus();

            } catch (error) {
                console.error(error);
            } finally {
                btn.innerText = "Submit Report 🚀";
                btn.disabled = false;
            }
        });

        function closeModal() {
            document.getElementById('successModal').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('loggedInUser');
            window.location.href = 'index.html';
        }

        loadMyReportsStatus();
    </script>
</body>
</html>
